services:
  - type: web
    name: pms-app
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT pms.asgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pms-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: pms-db
    plan: free