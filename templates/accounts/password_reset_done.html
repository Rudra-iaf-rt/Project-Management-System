<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | AuraPMS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-primary d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="auth-card card-premium text-center" style="max-width: 450px;">
        <div class="btn-icon bg-success-light text-success rounded-circle mb-3 mx-auto" style="width: 65px; height: 65px; font-size: 26px;">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        
        <h2 class="fw-bold mb-2" style="font-family: 'Outfit', sans-serif;">Check Your Inbox</h2>
        <p class="text-muted font-14 mb-4">We have sent a secure password reset link to your email address.</p>
        
        <div class="alert bg-badge-primary border-0 text-secondary font-12 py-2 mb-4">
            <i class="fas fa-clock text-primary me-1"></i> The link is valid for exactly 24 hours.
        </div>
        
        <p class="font-13 text-muted mb-4">
            Didn't receive the email? 
            <a href="{% url 'password_reset' %}" class="fw-bold">Try resending it</a>
        </p>
        
        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">
            <i class="fas fa-arrow-left me-2 font-11"></i> Back to Login
        </a>
    </div>
</body>
</html>
