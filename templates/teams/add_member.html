{% extends 'base.html' %}

{% block title %}Add Member to {{ team.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Add Member to: {{ team.name }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Select User</label>
                            {{ form.user }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            {{ form.role }}
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Add Member</button>
                            <a href="{% url 'team_detail' team.id %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
