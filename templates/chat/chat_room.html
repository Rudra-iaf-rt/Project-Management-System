{% extends 'base.html' %}
{% load static %}

{% block title %}Team Chat - {{ team.name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h4>Team Chat: {{ team.name }}</h4>
                </div>
                <div class="card-body" style="height: 500px; overflow-y: auto;" id="chat-messages">
                    {% for message in messages %}
                        <div class="message {% if message.user == request.user %}message-right{% else %}message-left{% endif %} mb-3">
                            <div class="message-content">
                                <strong>{{ message.user.username }}</strong>
                                <p>{{ message.message }}</p>
                                <small class="text-muted">{{ message.timestamp|timesince }} ago</small>
                            </div>
                        </div>
                    {% endfor %}
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" id="message-input" class="form-control" placeholder="Type your message...">
                        <button class="btn btn-primary" id="send-btn">
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/chat/{{ team.id }}/'
    );
    
    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const messagesDiv = document.getElementById('chat-messages');
        
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message message-left mb-3';
        messageDiv.innerHTML = `
            <div class="message-content">
                <strong>${data.username}</strong>
                <p>${data.message}</p>
                <small class="text-muted">just now</small>
            </div>
        `;
        
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };
    
    document.getElementById('send-btn').onclick = function(e) {
        const messageInput = document.getElementById('message-input');
        const message = messageInput.value;
        
        chatSocket.send(JSON.stringify({
            'message': message
        }));
        
        messageInput.value = '';
    };
    
    document.getElementById('message-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('send-btn').click();
        }
    });
</script>

<style>
.message-left {
    text-align: left;
}
.message-right {
    text-align: right;
}
.message-content {
    display: inline-block;
    padding: 10px 15px;
    border-radius: 10px;
    max-width: 70%;
}
.message-left .message-content {
    background: #f0f0f0;
}
.message-right .message-content {
    background: #007bff;
    color: white;
}
.message-right .message-content small {
    color: rgba(255,255,255,0.7);
}
</style>
{% endblock %}
